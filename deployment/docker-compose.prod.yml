# -------------------------------------------------------------------
# AI Engine — Production Compose (OpenAI + Nginx TLS)
#
# Prerequisites:
#   1. Copy .env.production.example to .env.production and fill values
#   2. Run nginx/init-letsencrypt.sh once to bootstrap SSL
#
# Start:
#   docker compose -p ai-engine -f deployment/docker-compose.prod.yml \
#     --env-file deployment/.env.production up -d
#
# Stop:
#   docker compose -p ai-engine -f deployment/docker-compose.prod.yml down
# -------------------------------------------------------------------

services:

  # ── API service ──────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.api
    environment:
      # LLM provider — set LLM_PROVIDER=anthropic in .env.production to use Claude
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_GENERATION_MODEL=${OPENAI_GENERATION_MODEL:-gpt-4o-mini}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_GENERATION_MODEL=${ANTHROPIC_GENERATION_MODEL:-claude-sonnet-4-6}
      # Embedding provider
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY:-}
      - VOYAGE_EMBEDDING_MODEL=${VOYAGE_EMBEDDING_MODEL:-voyage-4}
      # Vector store — Qdrant is the default for production
      - VECTOR_STORE=${VECTOR_STORE:-qdrant}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      # Runtime paths
      - WORKDIR=/engine
      - PORT=3000
      - API_KEYS_PATH=/app/config/api_keys.json
      - AUDIT_LOG_PATH=/engine/audit.log
      # Feature flags — V2 pipelines are the only active pipelines
      - CHAT_V2=true
      - INGEST_V2=true
    volumes:
      - engine_data:/engine
      - ${API_KEYS_HOST_PATH:-../config/api_keys.example.json}:/app/config/api_keys.json:ro
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Web UI ───────────────────────────────────────────────────────
  ui:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.ui
      args:
        # NEXT_PUBLIC_* vars are baked into the client bundle at build time.
        # Reuse DOMAIN (already set for nginx/SSL) so no extra var is needed.
        NEXT_PUBLIC_MICROSITE_ROOT_DOMAIN: ${DOMAIN:-}
        NEXT_PUBLIC_MICROSITE_CNAME_TARGET: ${MICROSITE_CNAME_TARGET:-}
        NEXT_PUBLIC_MICROSITE_SERVER_IP: ${MICROSITE_SERVER_IP:-}
    environment:
      - API_URL=http://api:3000
      # Microsite publishing — DOMAIN is the same root domain used by nginx/SSL.
      - MICROSITE_ROOT_DOMAIN=${DOMAIN:-}
      - MICROSITE_S3_BUCKET=${MICROSITE_S3_BUCKET:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - MICROSITE_ACCESS_SECRET=${MICROSITE_ACCESS_SECRET:-}
      # Custom domain publishing
      - MICROSITE_CUSTOM_DOMAINS_ENABLED=${MICROSITE_CUSTOM_DOMAINS_ENABLED:-false}
      - MICROSITE_CNAME_TARGET=${MICROSITE_CNAME_TARGET:-}
      - MICROSITE_SERVER_IP=${MICROSITE_SERVER_IP:-}
      - CERT_MANAGER_URL=http://cert-manager:3002
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Nginx reverse proxy + TLS termination ────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - letsencrypt_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
      - nginx_custom_conf:/etc/nginx/conf.d
    depends_on:
      ui:
        condition: service_healthy
    restart: unless-stopped

  # ── cert-manager: provisions Let's Encrypt certs for custom domains ──
  cert-manager:
    build:
      context: ..
      dockerfile: deployment/cert-manager/Dockerfile
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL:-}
      - NGINX_CONTAINER=${COMPOSE_PROJECT_NAME:-ai-engine}-nginx-1
      - PORT=3002
    volumes:
      - letsencrypt_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
      - nginx_custom_conf:/etc/nginx/conf.d
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - nginx
    restart: unless-stopped

  # ── Certbot (on-demand, not auto-started) ────────────────────────
  # dns-route53 image supports wildcard certs via DNS-01 challenge.
  # On EC2 with an IAM instance role attached, leave AWS_ACCESS_KEY_ID/SECRET blank
  # — the SDK will use instance metadata credentials automatically.
  certbot:
    image: certbot/dns-route53:latest
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
    volumes:
      - letsencrypt_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    profiles: ["certbot"]

volumes:
  engine_data:
    driver: local
  letsencrypt_certs:
    external: true
    name: ai-engine_letsencrypt_certs
  certbot_webroot:
    driver: local
  nginx_custom_conf:
    driver: local
